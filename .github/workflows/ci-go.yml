name: CI
run-name: CI for TLGen
on: [ "push", "pull_request" ]
jobs:
  ci-go:
    name: CI for (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26.2'
          cache: true

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

      - uses: dominikh/staticcheck-action@9716614d4101e79b4340dd97b10e54d68234e431 # v1.4.1
        if: matrix.os == 'ubuntu-latest'
        with:
          install-go: false

      - name: Run php tests
        if: matrix.os == 'ubuntu-latest'
        run: make php_test

      - name: Codegen helpers_cpp
        if: matrix.os == 'ubuntu-latest'
        run: cd scripts && bash move-basictl-cpp.sh

      - name: Run cpp tests
        if: matrix.os == 'ubuntu-latest'
        run: make cpp_test
